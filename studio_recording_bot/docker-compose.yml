services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: studio_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d studio_bot"]
      interval: 5s
      timeout: 5s
      retries: 20

  bot:
    build: .
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:

